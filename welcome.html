<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Assistente pessoal do Carlos Vasconcelos</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#122033;background:#fff}
.screen{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 22px calc(30px + env(safe-area-inset-bottom));text-align:center;background:radial-gradient(circle at 50% 24%,#eef6ff 0,#fff 50%)}
.avatar{width:min(390px,80vw);aspect-ratio:1;object-fit:contain;filter:drop-shadow(0 22px 34px rgba(10,79,180,.18))}.hello{margin:8px 0 8px;font-size:clamp(46px,12vw,66px);line-height:1;font-weight:950;letter-spacing:-.05em}.intro{max-width:620px;margin:0;color:#243752;font-size:clamp(19px,4.9vw,26px);line-height:1.5}.intro strong{color:#0868ea}.start{width:min(650px,100%);min-height:82px;margin-top:30px;border:0;border-radius:23px;background:linear-gradient(135deg,#1681ff,#0647bb);color:#fff;font-size:clamp(22px,5.6vw,30px);font-weight:950;box-shadow:0 18px 38px rgba(11,94,215,.31);display:flex;align-items:center;justify-content:center;gap:14px;cursor:pointer}.start:before{content:"💬";font-size:32px}.start:disabled{opacity:.75}.start:active{transform:translateY(1px)}
#assistantFrame{display:none;width:100%;height:100svh;border:0;background:#fff}
@media(max-height:760px){.screen{justify-content:flex-start;padding-top:18px}.avatar{width:min(300px,62vw)}.hello{margin-top:3px}.start{margin-top:18px;min-height:68px}}
</style>
</head>
<body>
<main class="screen" id="welcomeScreen">
<img class="avatar" src="/assistant-avatar.svg" alt="Assistente pessoal do Carlos Vasconcelos">
<h1 class="hello">Olá! 👋</h1>
<p class="intro">Sou o assistente pessoal do <strong>Carlos Vasconcelos</strong> para obter informações mais rapidamente.</p>
<button class="start" id="startAssistant">Iniciar assistente</button>
</main>
<iframe id="assistantFrame" title="Assistente do Carlos" src="about:blank"></iframe>
<script>
const button=document.getElementById('startAssistant');
const screen=document.getElementById('welcomeScreen');
const frame=document.getElementById('assistantFrame');
button.addEventListener('click',()=>{
  button.disabled=true;
  frame.src='/assistant-app';
  frame.style.display='block';
  screen.style.display='none';
});
frame.addEventListener('load',()=>{
  if(!frame.src.includes('assistant-app'))return;
  try{
    const doc=frame.contentDocument;
    doc.querySelector('.topbar')?.remove();
    const shell=doc.querySelector('.shell');if(shell){shell.style.padding='0';shell.style.width='100%'}
    const app=doc.querySelector('.app');if(app){app.style.border='0';app.style.borderRadius='0';app.style.boxShadow='none';app.style.minHeight='100vh'}
    const start=doc.getElementById('startBtn');if(start)start.click();
    doc.getElementById('resetBtn')?.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();location.reload()},true);
  }catch(e){location.href='/assistant-app'}
});
</script>
</body>
</html>
