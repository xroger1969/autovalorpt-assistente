<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Assistente pessoal do Carlos Vasconcelos</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#122033;background:linear-gradient(180deg,#fff 0,#f6f9fd 100%)}
.screen{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px calc(34px + env(safe-area-inset-bottom));text-align:center;background:radial-gradient(circle at 50% 25%,#edf6ff 0,#fff 48%)}
.avatar{width:min(360px,74vw);aspect-ratio:1;border-radius:50%;filter:drop-shadow(0 22px 32px rgba(10,79,180,.18))}.hello{margin:22px 0 8px;font-size:clamp(42px,11vw,62px);line-height:1;font-weight:950;letter-spacing:-.05em}.intro{max-width:610px;margin:0;color:#31435d;font-size:clamp(19px,4.8vw,25px);line-height:1.48}.intro strong{color:#0b63dc}.start{width:min(620px,100%);min-height:78px;margin-top:32px;border:0;border-radius:22px;background:linear-gradient(135deg,#1681ff,#0647bb);color:#fff;font-size:clamp(22px,5.5vw,29px);font-weight:950;box-shadow:0 18px 36px rgba(11,94,215,.30);display:flex;align-items:center;justify-content:center;gap:14px;cursor:pointer}.start:before{content:"💬";font-size:31px}.start:active{transform:translateY(1px)}
#assistantFrame{display:none;width:100%;height:100svh;border:0;background:#fff}
@media(max-height:720px){.screen{justify-content:flex-start;padding-top:22px}.avatar{width:min(280px,58vw)}.hello{margin-top:12px}.start{margin-top:20px;min-height:66px}}
</style>
</head>
<body>
<main class="screen" id="welcomeScreen">
<img class="avatar" src="/assistant-avatar.svg" alt="Assistente pessoal do Carlos Vasconcelos">
<h1 class="hello">Olá! 👋</h1>
<p class="intro">Sou o assistente pessoal do <strong>Carlos Vasconcelos</strong> para obter informações mais rapidamente.</p>
<button class="start" id="startAssistant">Iniciar assistente</button>
</main>
<iframe id="assistantFrame" title="Assistente do Carlos" src="about:blank"></iframe>
<script>
const button=document.getElementById('startAssistant');
const screen=document.getElementById('welcomeScreen');
const frame=document.getElementById('assistantFrame');
button.addEventListener('click',()=>{
  button.disabled=true;
  frame.src='/index.html?inside=1';
  frame.style.display='block';
  screen.style.display='none';
});
frame.addEventListener('load',()=>{
  if(!frame.src.includes('index.html'))return;
  try{
    const doc=frame.contentDocument;
    doc.querySelector('.topbar')?.remove();
    const shell=doc.querySelector('.shell'); if(shell){shell.style.padding='0';shell.style.width='100%'}
    const app=doc.querySelector('.app'); if(app){app.style.border='0';app.style.borderRadius='0';app.style.boxShadow='none';app.style.minHeight='100vh'}
    const start=doc.getElementById('startBtn'); if(start) start.click();
    doc.getElementById('resetBtn')?.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();location.reload()},true);
  }catch(e){location.href='/index.html'}
});
</script>
</body>
</html>
