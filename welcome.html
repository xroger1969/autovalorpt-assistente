<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Assistente pessoal do Carlos Vasconcelos</title>
<style>
:root{--blue:#0868e8;--blue-dark:#034ab9;--ink:#10233f;--muted:#243752;--glow:rgba(21,121,255,.24)}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}
body{overflow:hidden}
button{font:inherit}
.entry{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:max(18px,env(safe-area-inset-top)) 22px max(24px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 24%,#eef6ff 0,#fff 49%,#fff 100%)}
.entry-card{width:min(650px,100%);display:flex;flex-direction:column;align-items:center;text-align:center}
.avatar-wrap{position:relative;width:min(470px,82vw);aspect-ratio:1;margin:0 auto 14px;display:grid;place-items:center}
.avatar-halo,.avatar-halo::before,.avatar-halo::after{position:absolute;inset:7%;border-radius:50%;content:""}
.avatar-halo{background:linear-gradient(145deg,#4ba4ff,#0755d2);box-shadow:0 22px 60px var(--glow)}
.avatar-halo::before{inset:-5%;border:5px solid rgba(255,255,255,.92);box-shadow:0 0 0 2px rgba(20,107,229,.1)}
.avatar-halo::after{inset:-10%;border:2px solid rgba(255,255,255,.82)}
.avatar{position:relative;z-index:2;width:92%;height:92%;object-fit:contain;filter:drop-shadow(0 18px 26px rgba(6,66,154,.2))}
.chat-bubble{position:absolute;z-index:3;right:3%;top:24%;width:24%;aspect-ratio:1.16;border-radius:30%;background:#fff;box-shadow:0 14px 34px rgba(15,82,170,.18);display:flex;align-items:center;justify-content:center;gap:8%;padding:0 16%}
.chat-bubble::after{content:"";position:absolute;left:15%;bottom:-16%;border:14px solid transparent;border-top-color:#fff;transform:rotate(18deg)}
.chat-bubble i{display:block;width:11px;height:11px;border-radius:50%;background:var(--blue)}
.mini-icon{width:44px;height:44px;margin:4px auto 3px;color:var(--blue)}
.mini-icon svg{display:block;width:100%;height:100%}
h1{margin:0;font-size:clamp(52px,11vw,76px);line-height:1;font-weight:950;letter-spacing:-.055em}
.wave{display:inline-block;margin-left:5px;font-size:.72em;transform-origin:70% 70%;animation:wave 2.2s ease-in-out infinite}
@keyframes wave{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(18deg)}20%{transform:rotate(-8deg)}30%{transform:rotate(16deg)}40%{transform:rotate(-4deg)}}
.intro{max-width:570px;margin:22px auto 0;font-size:clamp(20px,4.8vw,29px);line-height:1.52;color:var(--muted)}
.intro strong{color:var(--blue);font-weight:950}
.start{width:100%;min-height:94px;margin-top:36px;padding:18px 28px;border:0;border-radius:26px;background:linear-gradient(135deg,#1684ff 0,#0868e8 48%,#0447bd 100%);color:#fff;box-shadow:0 18px 38px rgba(4,76,190,.3),inset 0 1px 0 rgba(255,255,255,.24);font-size:clamp(24px,5.4vw,34px);font-weight:950;display:flex;align-items:center;justify-content:center;gap:20px;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}
.start:hover{transform:translateY(-2px);box-shadow:0 22px 44px rgba(4,76,190,.34),inset 0 1px 0 rgba(255,255,255,.24)}
.start:active{transform:translateY(1px)}
.start:focus-visible{outline:4px solid rgba(8,104,232,.24);outline-offset:5px}
.start:disabled{opacity:.72;cursor:wait}
.start-icon{width:54px;height:54px;flex:0 0 auto;border-radius:17px;background:#fff;color:var(--blue);display:grid;place-items:center;box-shadow:0 7px 16px rgba(0,44,132,.2)}
.start-icon svg{width:34px;height:34px}
#assistantFrame{display:none;width:100%;height:100svh;border:0;background:#fff}
@media(max-height:820px){.entry{align-items:flex-start;padding-top:12px}.avatar-wrap{width:min(360px,66vw);margin-bottom:0}.mini-icon{width:34px;height:34px}h1{font-size:clamp(44px,8vw,60px)}.intro{margin-top:12px;font-size:clamp(18px,3.8vw,24px)}.start{min-height:74px;margin-top:20px;border-radius:21px}}
@media(max-width:480px){.entry{padding-left:18px;padding-right:18px}.avatar-wrap{width:min(390px,88vw)}.chat-bubble{border-radius:26%}.start{gap:14px}.start-icon{width:48px;height:48px;border-radius:15px}}
</style>
</head>
<body>
<main class="entry" id="welcomeScreen">
  <section class="entry-card" aria-labelledby="welcomeTitle">
    <div class="avatar-wrap" aria-hidden="true">
      <div class="avatar-halo"></div>
      <img class="avatar" src="/assistant-avatar.svg" alt="">
      <div class="chat-bubble"><i></i><i></i><i></i></div>
    </div>
    <div class="mini-icon" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="none"><path d="M12 8h24a7 7 0 0 1 7 7v13a7 7 0 0 1-7 7H24l-9 7v-7h-3a7 7 0 0 1-7-7V15a7 7 0 0 1 7-7Z" stroke="currentColor" stroke-width="3.8" stroke-linejoin="round"/><path d="M16 19h16M16 26h11" stroke="currentColor" stroke-width="3.8" stroke-linecap="round"/></svg>
    </div>
    <h1 id="welcomeTitle">Olá! <span class="wave">👋</span></h1>
    <p class="intro">Eu sou o assistente pessoal do <strong>Carlos Vasconcelos</strong> para obter informações mais rapidamente.</p>
    <button class="start" id="startAssistant" type="button">
      <span class="start-icon" aria-hidden="true"><svg viewBox="0 0 48 48" fill="none"><path d="M10 9h28a6 6 0 0 1 6 6v15a6 6 0 0 1-6 6H24l-10 8v-8h-4a6 6 0 0 1-6-6V15a6 6 0 0 1 6-6Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M15 20h18M15 28h13" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg></span>
      <span>Iniciar assistente</span>
    </button>
  </section>
</main>
<iframe id="assistantFrame" title="Assistente do Carlos" src="about:blank"></iframe>
<script>
const button=document.getElementById('startAssistant');
const screen=document.getElementById('welcomeScreen');
const frame=document.getElementById('assistantFrame');
button.addEventListener('click',()=>{
  button.disabled=true;
  frame.src='/index.html?inside=1';
  frame.style.display='block';
  screen.style.display='none';
});
frame.addEventListener('load',()=>{
  if(!frame.src.includes('index.html'))return;
  try{
    const doc=frame.contentDocument;
    doc.querySelector('.topbar')?.remove();
    const shell=doc.querySelector('.shell');
    if(shell){shell.style.padding='0';shell.style.width='100%'}
    const app=doc.querySelector('.app');
    if(app){app.style.border='0';app.style.borderRadius='0';app.style.boxShadow='none';app.style.minHeight='100vh'}
    const start=doc.getElementById('startBtn');
    if(start)start.click();
    doc.getElementById('resetBtn')?.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();location.reload()},true);
  }catch(e){location.href='/index.html'}
});
</script>
</body>
</html>
