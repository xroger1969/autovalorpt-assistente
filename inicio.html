<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b5ed7">
<title>Assistente pessoal do Carlos Vasconcelos</title>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#10213a;background:#fff}body{min-height:100vh;overflow:hidden}.welcome{position:fixed;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 22px calc(32px + env(safe-area-inset-bottom));text-align:center;background:radial-gradient(circle at 50% 17%,#eef6ff 0,#fff 46%)}.art{position:relative;width:min(390px,88vw);height:min(390px,88vw);margin:-24px auto 8px}.halo{position:absolute;inset:7%;border-radius:50%;background:linear-gradient(145deg,#1782ff,#0750d7);box-shadow:0 22px 50px rgba(11,94,215,.25),0 0 0 12px #fff,0 0 0 14px #d8e8ff}.person{position:absolute;left:18%;right:18%;bottom:8%;height:78%}.head{position:absolute;left:23%;top:7%;width:54%;height:49%;border-radius:46% 46% 43% 43%;background:linear-gradient(145deg,#f4bd91,#d98558);box-shadow:inset -10px -8px 18px rgba(128,59,29,.14)}.hair{position:absolute;left:18%;top:0;width:65%;height:28%;border-radius:60% 48% 35% 20%;background:linear-gradient(145deg,#3a241b,#140d0a);transform:rotate(-7deg)}.ear{position:absolute;top:27%;width:11%;height:18%;border-radius:50%;background:#df9368}.ear.l{left:17%}.ear.r{right:17%}.eye{position:absolute;top:25%;width:9%;height:9%;border-radius:50%;background:#25150f;box-shadow:inset 0 0 0 3px #fff}.eye.l{left:34%}.eye.r{right:34%}.brow{position:absolute;top:20%;width:17%;height:5%;border-radius:20px;background:#3b2117}.brow.l{left:29%;transform:rotate(-5deg)}.brow.r{right:29%;transform:rotate(5deg)}.nose{position:absolute;left:47%;top:31%;width:8%;height:15%;border-radius:50%;border-right:3px solid rgba(130,63,35,.28)}.smile{position:absolute;left:34%;top:49%;width:32%;height:15%;border-radius:0 0 50px 50px;background:#fff;border:4px solid #a84f35;border-top:0}.neck{position:absolute;left:40%;top:48%;width:20%;height:16%;background:#d9875d}.shirt{position:absolute;left:8%;right:8%;bottom:0;height:47%;border-radius:42% 42% 18% 18%;background:linear-gradient(145deg,#163f72,#082a55)}.arm{position:absolute;left:-2%;top:43%;width:33%;height:18%;border-radius:60px;background:#e59a6e;transform:rotate(-42deg);transform-origin:right center}.thumb{position:absolute;left:2%;top:24%;width:14%;height:34%;border-radius:30px;background:#e59a6e;transform:rotate(-10deg)}.bubble{position:absolute;right:0;top:21%;width:28%;height:20%;border-radius:28px;background:#fff;box-shadow:0 10px 28px rgba(7,64,150,.22)}.bubble:after{content:"";position:absolute;left:18%;bottom:-13px;border:12px solid transparent;border-top-color:#fff;border-left:0}.dots{height:100%;display:flex;align-items:center;justify-content:center;gap:10px}.dots i{width:12px;height:12px;border-radius:50%;background:#1474ef}.hello{margin:0;font-size:clamp(48px,11vw,72px);line-height:1;letter-spacing:-.05em}.intro{max-width:560px;margin:16px auto 0;font-size:clamp(19px,4.6vw,25px);line-height:1.45;color:#2b3a52}.intro strong{color:#0962dc}.start{width:min(560px,100%);min-height:76px;margin-top:30px;border:0;border-radius:22px;background:linear-gradient(135deg,#1680ff,#074cca);color:#fff;font-size:clamp(22px,5.5vw,31px);font-weight:950;box-shadow:0 17px 40px rgba(10,90,215,.32);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:14px}.start span{font-size:1.1em}.note{margin-top:14px;color:#7c889a;font-size:12px;font-weight:750}.appframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff;visibility:hidden}.running .welcome{display:none}.running .appframe{visibility:visible}@media(max-height:740px){.art{width:min(285px,65vw);height:min(285px,65vw)}.hello{font-size:44px}.intro{font-size:18px}.start{min-height:62px;margin-top:20px}}
</style>
</head>
<body>
<section class="welcome" aria-label="Entrada do assistente pessoal">
  <div class="art" aria-hidden="true">
    <div class="halo"></div>
    <div class="person"><div class="shirt"></div><div class="neck"></div><div class="ear l"></div><div class="ear r"></div><div class="head"><div class="hair"></div><div class="brow l"></div><div class="brow r"></div><div class="eye l"></div><div class="eye r"></div><div class="nose"></div><div class="smile"></div></div><div class="arm"></div><div class="thumb"></div></div>
    <div class="bubble"><div class="dots"><i></i><i></i><i></i></div></div>
  </div>
  <h1 class="hello">Olá! 👋</h1>
  <p class="intro">Sou o assistente pessoal do <strong>Carlos Vasconcelos</strong> para obter informações mais rapidamente.</p>
  <button class="start" id="start"><span>💬</span> Iniciar assistente</button>
  <div class="note">Resposta rápida e sem compromisso</div>
</section>
<iframe class="appframe" id="appframe" src="/index.html" title="Assistente do Carlos Vasconcelos"></iframe>
<script>
const button=document.getElementById('start');
const frame=document.getElementById('appframe');
button.addEventListener('click',()=>{
  document.body.classList.add('running');
  const begin=()=>{try{frame.contentDocument.getElementById('startBtn')?.click()}catch{}};
  if(frame.contentDocument?.readyState==='complete') begin(); else frame.addEventListener('load',begin,{once:true});
});
</script>
</body>
</html>
